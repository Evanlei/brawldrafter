# When Railway Root Directory = backend
[phases.setup]
nixPkgs = ["python311"]

[phases.install]
cmds = [
  "pip install torch --index-url https://download.pytorch.org/whl/cpu",
  "pip install -r requirements.txt",
]

[start]
cmd = "PYTHONPATH=/app uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
